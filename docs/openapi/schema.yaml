openapi: 3.0.3
info:
  title: Job Board API
  version: 1.0.0
  description: |-
    Production-style job board REST API.

    **Roles:** `recruiter` (post jobs, review applicants) · `job_seeker` (browse, apply, save jobs)

    **Auth:** Register or login to obtain JWT tokens. Click **Authorize** and enter `Bearer <access_token>`.
  contact:
    name: Job Board API
    email: api@jobboard.example
  license:
    name: MIT
paths:
  /api/v1/health/:
    get:
      operationId: health_retrieve
      description: Returns service liveness status. No authentication required.
      summary: API health check
      tags:
      - Health
      security:
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: Create a recruiter or job seeker account. Returns user profile
        and JWT tokens.
      summary: Register a new account
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              JobSeekerRegistration:
                value:
                  email: seeker@example.com
                  password: SecurePass123!
                  password_confirm: SecurePass123!
                  role: job_seeker
                  full_name: Jane Doe
                summary: Job seeker registration
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Authenticate with email and password. Returns JWT access/refresh
        tokens and user data.
      summary: Login
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
            examples:
              Login:
                value:
                  email: seeker@example.com
                  password: SecurePass123!
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
  /api/v1/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: Exchange a valid refresh token for a new access token.
      summary: Refresh access token
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Blacklist the refresh token. Requires a valid access token in the
        Authorization header.
      summary: Logout
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Return the authenticated user's account and profile.
      summary: Get current user
      tags:
      - Auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/auth/profile/me/:
    get:
      operationId: auth_profile_me_retrieve
      summary: Get my profile
      tags:
      - Profiles
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
          description: ''
    put:
      operationId: auth_profile_me_update
      summary: Replace my profile
      tags:
      - Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProfileRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
          description: ''
    patch:
      operationId: auth_profile_me_partial_update
      summary: Update my profile
      tags:
      - Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
          description: ''
  /api/v1/companies/:
    post:
      operationId: companies_create
      description: |-
        Companies are publicly readable.
        Recruiters create companies; only the owner may update or delete.
      summary: Create company
      tags:
      - Companies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CompanyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CompanyRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
          description: ''
    get:
      operationId: companies_list
      description: Public list. Recruiters may pass `?mine=1` to list own companies.
      summary: List companies
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Companies
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCompanyList'
          description: ''
  /api/v1/companies/{id}/:
    patch:
      operationId: companies_partial_update
      description: |-
        Companies are publicly readable.
        Recruiters create companies; only the owner may update or delete.
      summary: Partial update company
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this company.
        required: true
      tags:
      - Companies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCompanyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCompanyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCompanyRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
          description: ''
    put:
      operationId: companies_update
      description: |-
        Companies are publicly readable.
        Recruiters create companies; only the owner may update or delete.
      summary: Update company
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this company.
        required: true
      tags:
      - Companies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CompanyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CompanyRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
          description: ''
    get:
      operationId: companies_retrieve
      description: |-
        Companies are publicly readable.
        Recruiters create companies; only the owner may update or delete.
      summary: Get company
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this company.
        required: true
      tags:
      - Companies
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
          description: ''
    delete:
      operationId: companies_destroy
      description: |-
        Companies are publicly readable.
        Recruiters create companies; only the owner may update or delete.
      summary: Delete company
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this company.
        required: true
      tags:
      - Companies
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/jobs/:
    post:
      operationId: jobs_create
      summary: Create job
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
            examples:
              CreateJob:
                value:
                  title: Senior Python Developer
                  description: Build APIs with Django and DRF.
                  salary: '95000.00'
                  location: Remote
                  job_type: remote
                  experience_level: senior
                  company_id: 1
                summary: Create job
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreate'
          description: ''
    get:
      operationId: jobs_list
      description: 'Browse active jobs with `search`, `location`, `job_type`, `experience_level`,
        `company`, `salary_min`, `salary_max`, and `ordering`. Responses are cached
        (Redis). Recruiters: `?mine=1` for own jobs.'
      summary: List jobs
      parameters:
      - in: query
        name: company
        schema:
          type: number
      - in: query
        name: experience_level
        schema:
          type: string
          enum:
          - entry
          - lead
          - mid
          - senior
        description: |-
          * `entry` - Entry
          * `mid` - Mid
          * `senior` - Senior
          * `lead` - Lead
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: job_type
        schema:
          type: string
          enum:
          - contract
          - full_time
          - hybrid
          - part_time
          - remote
        description: |-
          * `full_time` - Full Time
          * `part_time` - Part Time
          * `contract` - Contract
          * `remote` - Remote
          * `hybrid` - Hybrid
      - in: query
        name: location
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: salary_max
        schema:
          type: number
      - in: query
        name: salary_min
        schema:
          type: number
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Jobs
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobList'
          description: ''
  /api/v1/jobs/{id}/:
    patch:
      operationId: jobs_partial_update
      summary: Partial update job
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this job.
        required: true
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedJobRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedJobRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedJobRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
          description: ''
    put:
      operationId: jobs_update
      summary: Update job
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this job.
        required: true
      tags:
      - Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/JobRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/JobRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
          description: ''
    get:
      operationId: jobs_retrieve
      summary: Get job
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this job.
        required: true
      tags:
      - Jobs
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
          description: ''
    delete:
      operationId: jobs_destroy
      description: 'Soft-delete: sets `is_active=false`.'
      summary: Delete job
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this job.
        required: true
      tags:
      - Jobs
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/saved-jobs/:
    post:
      operationId: saved_jobs_create
      summary: Save a job
      tags:
      - Saved Jobs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavedJobRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SavedJobRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SavedJobRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedJob'
          description: ''
    get:
      operationId: saved_jobs_list
      summary: List saved jobs
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Saved Jobs
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSavedJobList'
          description: ''
  /api/v1/saved-jobs/{id}/:
    get:
      operationId: saved_jobs_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this saved job.
        required: true
      tags:
      - saved-jobs
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedJob'
          description: ''
    delete:
      operationId: saved_jobs_destroy
      summary: Unsave a job
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this saved job.
        required: true
      tags:
      - Saved Jobs
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/applications/:
    post:
      operationId: applications_create
      description: Job seeker submits an application for an active job.
      summary: Apply for a job
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
            examples:
              ApplyForJob:
                value:
                  job_id: 1
                  cover_letter: I have 5 years of Django experience.
                summary: Apply for job
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
          description: ''
  /api/v1/applications/me/:
    get:
      operationId: applications_me_list
      description: List applications submitted by the authenticated job seeker. Filter
        by `status` or `job`.
      summary: My applications
      parameters:
      - in: query
        name: job
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - hired
          - pending
          - rejected
          - reviewed
          - shortlisted
        description: |-
          * `pending` - Pending
          * `reviewed` - Reviewed
          * `shortlisted` - Shortlisted
          * `rejected` - Rejected
          * `hired` - Hired
      tags:
      - Applications
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApplicationList'
          description: ''
  /api/v1/applications/{id}/status/:
    patch:
      operationId: applications_status_partial_update
      description: Recruiter (job poster) updates applicant status.
      summary: Update application status
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedApplicationStatusUpdateRequest'
            examples:
              ShortlistApplicant:
                value:
                  status: shortlisted
                summary: Shortlist applicant
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedApplicationStatusUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedApplicationStatusUpdateRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplicant'
          description: ''
    put:
      operationId: applications_status_update
      summary: Update application status
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationStatusUpdateRequest'
            examples:
              ShortlistApplicant:
                value:
                  status: shortlisted
                summary: Shortlist applicant
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApplicationStatusUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApplicationStatusUpdateRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplicant'
          description: ''
  /api/v1/jobs/{job_id}/applicants/:
    get:
      operationId: jobs_applicants_list
      description: Recruiter views applicants for a job they posted. Filter by `status`.
      summary: List job applicants
      parameters:
      - in: path
        name: job_id
        schema:
          type: integer
        description: Job ID
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - hired
          - pending
          - rejected
          - reviewed
          - shortlisted
        description: |-
          * `pending` - Pending
          * `reviewed` - Reviewed
          * `shortlisted` - Shortlisted
          * `rejected` - Rejected
          * `hired` - Hired
      tags:
      - Applications
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJobApplicantList'
          description: ''
components:
  schemas:
    Applicant:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        profile:
          allOf:
          - $ref: '#/components/schemas/Profile'
          readOnly: true
      required:
      - email
      - id
      - profile
    Application:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        job:
          allOf:
          - $ref: '#/components/schemas/Job'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ApplicationStatusEnum'
          readOnly: true
        status_display:
          type: string
          readOnly: true
        cover_letter:
          type: string
          readOnly: true
        applied_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - applied_at
      - cover_letter
      - id
      - job
      - status
      - status_display
      - updated_at
    ApplicationCreateRequest:
      type: object
      properties:
        job_id:
          type: integer
          writeOnly: true
        cover_letter:
          type: string
      required:
      - job_id
    ApplicationStatusEnum:
      enum:
      - pending
      - reviewed
      - shortlisted
      - rejected
      - hired
      type: string
      description: |-
        * `pending` - Pending
        * `reviewed` - Reviewed
        * `shortlisted` - Shortlisted
