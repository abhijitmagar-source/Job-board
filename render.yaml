# Render Blueprint — Django API + PostgreSQL
services:
  - type: web
    name: job-board-api
    runtime: python
    pythonVersion: "3.12"
    region: virginia
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements/prod.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: job-board-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: job-board-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://job-board-eight-henna.vercel.app
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: job-board-db
    plan: free
    region: virginia
    databaseName: jobboard
    user: jobboard