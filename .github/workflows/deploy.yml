name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify deployment readiness
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-deploy-secret-key-minimum-32-characters
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/base.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Django check and migrate
        working-directory: backend
        run: |
          python manage.py check
          python manage.py migrate --noinput

      - name: Django production deploy check
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          DATABASE_URL: postgresql://jobboard:jobboard@localhost:5432/jobboard
          ALLOWED_HOSTS: localhost
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          SECURE_SSL_REDIRECT: "False"
        run: python manage.py check --deploy

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify deployment configs
        run: |
          test -f render.yaml
          test -f frontend/vercel.json
          echo "Deployment configs present — ready for Vercel + Render"
