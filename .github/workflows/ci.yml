name: CI

on:
  push:
    branches: [main, master, "cursor/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: jobboard_test
          MYSQL_USER: jobboard
          MYSQL_PASSWORD: jobboard
          MYSQL_ROOT_PASSWORD: rootsecret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootsecret"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DJANGO_SETTINGS_MODULE: config.settings.ci
      DJANGO_SECRET_KEY: ci-test-secret-key-minimum-32-characters-long
      DATABASE_URL: mysql://jobboard:jobboard@127.0.0.1:3306/jobboard_test
      REDIS_URL: redis://127.0.0.1:6379/1
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SECURE_SSL_REDIRECT: "False"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements/base.txt
            backend/requirements/dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Validate OpenAPI schema
        working-directory: backend
        run: python manage.py spectacular --validate --fail-on-warn

      - name: Run tests
        working-directory: backend
        run: pytest

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: false
          tags: jobboard-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: false
          tags: jobboard-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
