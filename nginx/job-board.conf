# Nginx site config for AWS EC2 (Phase 10 deployment)
# Install: sudo cp job-board.conf /etc/nginx/sites-available/job-board
#          sudo ln -s /etc/nginx/sites-available/job-board /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream jobboard_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream jobboard_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name your-domain.com;

    client_max_body_size 20M;

    # Certbot will add SSL server block (Phase 10)

    location /static/ {
        alias /var/www/jobboard/static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/jobboard/media/;
        expires 7d;
        access_log off;
    }

    location /api/ {
        proxy_pass http://jobboard_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://jobboard_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://jobboard_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
